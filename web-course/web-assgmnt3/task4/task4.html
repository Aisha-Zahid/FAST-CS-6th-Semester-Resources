<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><b>Rock Paper Scissors</b></title>
<link rel="stylesheet" href="styles4.css">
</head>
<body>
<div class="container">
  <h1>Rock Paper Scissors</h1>
  <div class="choices">
    <button id="rock" class="choice" data-choice="rock">Rock</button>
    <button id="paper" class="choice" data-choice="paper">Paper</button>
    <button id="scissors" class="choice" data-choice="scissors">Scissors</button>
  </div>
  <div class="result"></div>
  <div class="score">Score: <span id="score">0</span></div>
</div>
<script src="script4.js"></script>
</body>
</html>
